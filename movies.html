<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMTV - Movies</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body { background: #050716; }

        /* HEADER */
        .section-header {
            text-align: center;
            margin-top: 110px;
            margin-bottom: 20px;
        }

        .section-logo {
            height: 90px;
            filter: drop-shadow(0 0 10px #a64dff);
        }

        .section-title {
            margin-top: 10px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #a64dff;
        }

        /* BACK / NEXT BUTTONS */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 10px 30px 25px 30px;
        }

        .btn-nav {
            background: #11152b;
            border: 1px solid #2b2c7f;
            padding: 8px 18px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-nav:hover {
            background: #1a1f3d;
            box-shadow: 0 0 10px #a64dff;
            transform: scale(1.05);
        }

        /* CONTENT */
        .movies-container {
            padding: 0 30px 50px 30px;
            color: white;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .movie-card {
            background: #11152b;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #2b2c7f;
            text-align: center;
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #a64dff;
            background: #1a1f3d;
        }

        .movie-title {
            margin-top: 8px;
            font-size: 15px;
            opacity: 0.9;
        }

        video {
            width: 100%;
            max-height: 450px;
            border-radius: 12px;
            margin-bottom: 25px;
            background: black;
        }
    </style>
</head>

<script>
const serverURL = "http://192.168.12.126:5500/MOVIES/";

async function loadFolder(url) {
    const response = await fetch(url);
    const text = await response.text();
    const parser = new DOMParser();
    const htmlDoc = parser.parseFromString(text, "text/html");
    const links = [...htmlDoc.querySelectorAll("a")];
    return links.map(a => a.getAttribute("href")).filter(n => n !== "../");
}
