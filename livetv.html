<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMTV - Movies</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050716;
  color: #fff;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* HEADER */
.section-header {
  text-align: center;
  margin-top: 70px;
}

.section-logo {
  height: 80px;
  filter: drop-shadow(0 0 10px #a64dff);
}

.section-title {
  font-size: 30px;
  font-weight: bold;
  text-shadow: 0 0 15px #a64dff;
}

/* LAYOUT */
.sidebar {
  width: 220px;
  background: #0b1020;
  padding: 10px;
  overflow-y: auto;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* BUTTONS */
.category-btn {
  width: 100%;
  padding: 8px;
  margin-bottom: 6px;
  border: none;
  border-radius: 4px;
  background: #151a30;
  color: #fff;
  cursor: pointer;
}

.category-btn:hover,
.category-btn.active {
  background: #ff006e;
}

/* PLAYER */
.player-container {
  padding: 10px;
}

video {
  width: 100%;
  max-height: 45vh;
  background: black;
  border-radius: 6px;
}

/* CHANNELS */
.channels-list {
  overflow-y: auto;
  padding: 10px;
}

.channel-item {
  padding: 8px;
  background: #0f172a;
  margin-bottom: 5px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.channel-item:hover {
  background: #1e293b;
}

.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  background: #111827;
}
</style>
</head>

<body>

 <!-- NAVBAR (PA MANYEN) -->
    <div class="navbar">
        <a class="nav-item" href="index.html">🏠 HOME</a>
        <a class="nav-item" href="movies.html">🎬 MOVIES</a>
        <a class="nav-item" href="videos.html">🎞️ VIDEOS</a>
        <a class="nav-item" href="cartoons.html">🧸 CARTOONS</a>
        <a class="nav-item" href="musics.html">🎵 MUSICS</a>
        <a class="nav-item" href="adults.html">🔞 ADULTS</a>
    </div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Kategori</h3>

  <button class="category-btn active" data-category="all">All</button>
  <button class="category-btn" data-category="movies">Movies</button>
  <button class="category-btn" data-category="sport">Sport</button>
  <button class="category-btn" data-category="news">News</button>
  <button class="category-btn" data-category="kids">Kids</button>

  <h3>COUNTRIES</h3>
  <button class="category-btn" data-country="HT">Haiti</button>
  <button class="category-btn" data-country="FR">France</button>
  <button class="category-btn" data-country="US">USA</button>

  <h3>ADULT LIVE TV</h3>
  <button id="unlock-xxx" class="category-btn">XXX</button>
  <button id="xxx-btn" class="category-btn" style="display:none;">XXX</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="section-header">
    <img src="logo-lmtv.png" class="section-logo">
    <h1 class="section-title">LIVE TV</h1>
  </div>

  <div class="player-container">
    <video id="player" controls></video>
    <div id="nowPlaying">MENU LIVE TV</div>
  </div>

  <div class="channels-list" id="channelsList"></div>

</div>

<script>
/* =========================
   SOURCES IPTV
========================= */

const mainPlaylist = "https://iptv-org.github.io/iptv/index.m3u";

const countryPlaylists = {
  HT: "https://iptv-org.github.io/iptv/countries/ht.m3u",
  FR: "https://iptv-org.github.io/iptv/countries/fr.m3u",
  US: "https://iptv-org.github.io/iptv/countries/us.m3u"
};

/* =========================
   DATA
========================= */
let allChannels = [];
let countryChannels = [];

let currentCategory = "all";
let currentCountry = null;

/* =========================
   ELEMENTS
========================= */
const player = document.getElementById("player");
const list = document.getElementById("channelsList");
const now = document.getElementById("nowPlaying");

/* =========================
   FETCH
========================= */
async function fetchText(url){
  const res = await fetch(url);
  return await res.text();
}

/* =========================
   PARSE M3U (FIXED)
========================= */
function parseM3U(text){
  const lines = text.split("\n");
  let channels = [];
  let info = null;

  for(let line of lines){
    line = line.trim();

    if(line.startsWith("#EXTINF")){
      const match = line.match(/,(.*)$/);
      const group = line.match(/group-title="([^"]*)"/i);

      info = {
        name: match ? match[1] : "Unknown",
        group: group ? group[1].toLowerCase() : ""
      };
    }
    else if(line && !line.startsWith("#") && info){
      info.url = line;
      channels.push(info);
      info = null;
    }
  }

  return channels;
}

/* =========================
   LOAD MAIN (ALL + MOVIES etc)
========================= */
async function loadMain(){
  const txt = await fetchText(mainPlaylist);
  allChannels = parseM3U(txt);
  render();
}

/* =========================
   LOAD COUNTRY
========================= */
async function loadCountry(code){
  const txt = await fetchText(countryPlaylists[code]);
  countryChannels = parseM3U(txt);
  render();
}

/* =========================
   CATEGORY FILTER
========================= */
function matchCategory(ch){

  if(currentCategory === "all") return true;

  const name = ch.name.toLowerCase();
  const group = ch.group;

  if(currentCategory === "movies"){
    return group.includes("movie") || name.includes("movie");
  }

  if(currentCategory === "sport"){
    return group.includes("sport") || name.includes("sport");
  }

  if(currentCategory === "news"){
    return group.includes("news") || name.includes("news");
  }

  if(currentCategory === "kids"){
    return group.includes("kids") || name.includes("cartoon") || name.includes("kids");
  }

  return true;
}

/* =========================
   RENDER
========================= */
function render(){

  list.innerHTML = "";

  let data = currentCountry ? countryChannels : allChannels;

  let filtered = data.filter(matchCategory);

  if(filtered.length === 0){
    list.innerHTML = "<p>No channels found</p>";
    return;
  }

  filtered.forEach(ch => {
    const div = document.createElement("div");
    div.className = "channel-item";
    div.innerHTML = `
      <span>${ch.name}</span>
      <span class="badge">▶</span>
    `;
    div.onclick = () => play(ch);
    list.appendChild(div);
  });
}

/* =========================
   PLAY
========================= */
function play(ch){
  player.src = ch.url;
  now.textContent = "Now Playing: " + ch.name;
  player.play().catch(()=>{});
}

/* =========================
   BUTTON EVENTS
========================= */
document.querySelectorAll(".category-btn").forEach(btn=>{
  btn.onclick = ()=>{

    const cat = btn.dataset.category;
    const country = btn.dataset.country;

    document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    if(country){
      currentCountry = country;
      loadCountry(country);
      return;
    }

    if(cat){
      currentCountry = null;
      currentCategory = cat;
      render();
    }
  };
});

/* =========================
   INIT
========================= */
loadMain();

</script>

</body>
</html>
