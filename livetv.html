<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMTV - LIVE TV</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050716;
  color: #fff;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: #0b1020;
  padding: 12px;
  display: flex;
  justify-content: center;
  gap: 20px;
  z-index: 999;
  border-bottom: 2px solid #ff006e;
}

.nav-item {
  color: white;
  text-decoration: none;
  font-size: 16px;
  padding: 6px 12px;
  border-radius: 4px;
  transition: 0.3s;
}

.nav-item:hover {
  background: #ff006e;
}

/* HEADER */
.section-header {
  text-align: center;
  margin-top: 70px;
}

.section-logo {
  height: 80px;
  filter: drop-shadow(0 0 10px #a64dff);
}

.section-title {
  font-size: 30px;
  font-weight: bold;
  text-shadow: 0 0 15px #a64dff;
}

/* LAYOUT */
.sidebar {
  width: 220px;
  background: #0b1020;
  padding: 10px;
  overflow-y: auto;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* BUTTONS */
.category-btn {
  width: 100%;
  padding: 8px;
  margin-bottom: 6px;
  border: none;
  border-radius: 4px;
  background: #151a30;
  color: #fff;
  cursor: pointer;
}

.category-btn:hover,
.category-btn.active {
  background: #ff006e;
}

/* PLAYER */
.player-container {
  padding: 10px;
}

video {
  width: 100%;
  max-height: 45vh;
  background: black;
  border-radius: 6px;
}

/* CHANNELS */
.channels-list {
  overflow-y: auto;
  padding: 10px;
}

.channel-item {
  padding: 8px;
  background: #0f172a;
  margin-bottom: 5px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
}

.channel-item:hover {
  background: #1e293b;
}

.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 10px;
  background: #111827;
}
</style>
</head>

<body>

<!-- NAVBAR (PA MANYEN) -->
    <div class="navbar">
        <a class="nav-item" href="index.html">🏠 HOME</a>
        <a class="nav-item" href="movies.html">🎬 MOVIES</a>
        <a class="nav-item" href="videos.html">🎞️ VIDEOS</a>
        <a class="nav-item" href="cartoons.html">🧸 CARTOONS</a>
        <a class="nav-item" href="musics.html">🎵 MUSICS</a>
    </div>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>CATEGORIES</h3>
  <button class="category-btn active" data-category="all">All</button>
  <button class="category-btn" data-category="movies">Movies</button>
  <button class="category-btn" data-category="sports">Sports</button>
  <button class="category-btn" data-category="news">News</button>
  <button class="category-btn" data-category="kids">Kids</button>
  <button class="category-btn" data-category="music">Music</button>
  <button class="category-btn" data-category="documentary">Documentary</button>
  <button class="category-btn" data-category="religious">Religious</button>
  <button class="category-btn" data-category="family">Family</button>
  <button class="category-btn" data-category="comedy">Comedy</button>
  <button class="category-btn" data-category="outdoor">Outdoor</button>
  <button class="category-btn" data-category="relax">Relax</button>
  <button class="category-btn" data-category="animation">Animation</button>
  <button class="category-btn" data-category="business">Business</button>
  <button class="category-btn" data-category="auto">Auto</button>
  <button class="category-btn" data-category="education">Education</button>

  <h3>COUNTRIES</h3>
  <button class="category-btn" data-country="HT">Haiti</button>
  <button class="category-btn" data-country="FR">France</button>
  <button class="category-btn" data-country="US">USA</button>

  <h3>LANGUAGES</h3>
  <button class="category-btn" data-lang="FR">French</button>
  <button class="category-btn" data-lang="US">English</button>
  <button class="category-btn" data-lang="ES">Spanish</button>

</div>

<!-- MAIN -->
<div class="main">

  <div class="section-header">
    <img src="logo-lmtv.png" class="section-logo">
    <h1 class="section-title">LIVE TV</h1>
  </div>

  <div class="player-container">
    <video id="player" controls></video>
    <div id="nowPlaying">MENU LIVE TV</div>
  </div>

  <div class="channels-list" id="channelsList"></div>

</div>

<script>

/* =========================
   PLAYLIST SOURCES
========================= */

const mainPlaylist = "https://iptv-org.github.io/iptv/index.m3u";

const countryPlaylists = {
  HT: "https://iptv-org.github.io/iptv/countries/ht.m3u",
  FR: "https://iptv-org.github.io/iptv/countries/fr.m3u",
  US: "https://iptv-org.github.io/iptv/countries/us.m3u"
};

const languagePlaylists = {
  FR: "https://iptv-org.github.io/iptv/languages/fra.m3u",
  US: "https://iptv-org.github.io/iptv/languages/eng.m3u",
  ES: "https://iptv-org.github.io/iptv/languages/spa.m3u"
};

/* =========================
   DATA
========================= */
let allChannels = [];
let filteredChannels = [];

let currentCategory = "all";
let currentCountry = null;
let currentLanguage = null;

/* =========================
   ELEMENTS
========================= */
const player = document.getElementById("player");
const list = document.getElementById("channelsList");
const now = document.getElementById("nowPlaying");

/* =========================
   FETCH
========================= */
async function fetchText(url){
  const res = await fetch(url);
  return await res.text();
}

/* =========================
   PARSE M3U
========================= */
function parseM3U(text){
  const lines = text.split("\n");
  let channels = [];
  let info = null;

  for(let line of lines){
    line = line.trim();

    if(line.startsWith("#EXTINF")){
      const match = line.match(/,(.*)$/);
      const group = line.match(/group-title="([^"]*)"/i);

      info = {
        name: match ? match[1] : "Unknown",
        group: group ? group[1].toLowerCase() : ""
      };
    }
    else if(line && !line.startsWith("#") && info){
      info.url = line;
      channels.push(info);
      info = null;
    }
  }

  return channels;
}

/* =========================
   LOAD MAIN
========================= */
async function loadMain(){
  const txt = await fetchText(mainPlaylist);
  allChannels = parseM3U(txt);
  render();
}

/* =========================
   LOAD COUNTRY
========================= */
async function loadCountry(code){
  const txt = await fetchText(countryPlaylists[code]);
  allChannels = parseM3U(txt);
  render();
}

/* =========================
   LOAD LANGUAGE
========================= */
async function loadLanguage(code){
  const txt = await fetchText(languagePlaylists[code]);
  allChannels = parseM3U(txt);
  render();
}

/* =========================
   CATEGORY FILTER
========================= */
function matchCategory(ch){

  if(currentCategory === "all") return true;

  const name = ch.name.toLowerCase();
  const group = ch.group;

  return (
    group.includes(currentCategory) ||
    name.includes(currentCategory)
  );
}

/* =========================
   RENDER
========================= */
function render(){

  list.innerHTML = "";

  filteredChannels = allChannels.filter(matchCategory);

  if(filteredChannels.length === 0){
    list.innerHTML = "<p>No channels found</p>";
    return;
  }

  filteredChannels.forEach(ch => {
    const div = document.createElement("div");
    div.className = "channel-item";
    div.innerHTML = `
      <span>${ch.name}</span>
      <span class="badge">▶</span>
    `;
    div.onclick = () => play(ch);
    list.appendChild(div);
  });
}

/* =========================
   PLAY
========================= */
function play(ch){
  player.src = ch.url;
  now.textContent = "Now Playing: " + ch.name;
  player.play().catch(()=>{});
}

/* =========================
   BUTTON EVENTS
========================= */
document.querySelectorAll(".category-btn").forEach(btn=>{
  btn.onclick = ()=>{

    const cat = btn.dataset.category;
    const country = btn.dataset.country;
    const lang = btn.dataset.lang;

    document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    if(country){
      loadCountry(country);
      return;
    }

    if(lang){
      loadLanguage(lang);
      return;
    }

    if(cat){
      currentCategory = cat;
      render();
    }
  };
});

/* =========================
   INIT
========================= */
loadMain();

</script>

</body>
</html>
