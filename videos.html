<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMTV - Videos</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body { background: #050716; }

        /* HEADER */
        .section-header {
            text-align: center;
            margin-top: 110px;
            margin-bottom: 20px;
        }

        .section-logo {
            height: 90px;
            filter: drop-shadow(0 0 10px #a64dff);
        }

        .section-title {
            margin-top: 10px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #a64dff;
        }

        /* BACK / NEXT BUTTONS */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 10px 30px 25px 30px;
        }

        .btn-nav {
            background: #11152b;
            border: 1px solid #2b2c7f;
            padding: 8px 18px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-nav:hover {
            background: #1a1f3d;
            box-shadow: 0 0 10px #a64dff;
            transform: scale(1.05);
        }

        /* CONTENT */
        .videos-container {
            padding: 0 30px 50px 30px;
            color: white;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background: #11152b;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #2b2c7f;
            text-align: center;
        }

        .video-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #a64dff;
            background: #1a1f3d;
        }

        .video-title {
            margin-top: 8px;
            font-size: 15px;
            opacity: 0.9;
        }

        video {
            width: 100%;
            max-height: 450px;
            border-radius: 12px;
            margin-bottom: 25px;
            background: black;
        }
    </style>
</head>

<body>

    <!-- NAVBAR (PA MANYEN) -->
    <div class="navbar">
        <a class="nav-item" href="index.html">🏠 HOME</a>
        <a class="nav-item" href="livetv.html">📺 LIVE TV</a>
        <a class="nav-item" href="movies.html">🎬 MOVIES</a>
        <a class="nav-item" href="videos.html">🎞️ VIDEOS</a>
        <a class="nav-item" href="cartoons.html">🧸 CARTOONS</a>
        <a class="nav-item" href="musics.html">🎵 MUSICS</a>
        <a class="nav-item" href="adults.html">🔞 ADULTS</a>
    </div>

    <!-- HEADER -->
    <div class="section-header">
        <img src="logo-lmtv.png" class="section-logo">
        <h1 class="section-title">VIDEOS</h1>
    </div>

    <!-- BACK / NEXT BUTTONS -->
    <div class="nav-buttons">
        <button class="btn-nav" onclick="goBack()">⬅ Back</button>
        <button class="btn-nav" onclick="goForward()">Next ➡</button>
    </div>

    <!-- CONTENT -->
    <div class="videos-container">

        <!-- VIDEO PLAYER -->
        <video id="player" controls></video>

        <!-- VIDEOS GRID -->
        <div class="videos-grid" id="videosGrid"></div>

    </div>

<script>
const serverURL = "http://192.168.12.126:5500/VIDEOS/";

// Chaje fichye nan nenpòt folder
async function loadFolder(url) {
    const response = await fetch(url);
    const text = await response.text();

    const parser = new DOMParser();
    const htmlDoc = parser.parseFromString(text, "text/html");

    const links = [...htmlDoc.querySelectorAll("a")];

    return links
        .map(a => a.getAttribute("href"))
        .filter(name => name !== "../");
}

async function loadVideos() {
    const grid = document.getElementById("videosGrid");

    const rootItems = await loadFolder(serverURL);

    for (const item of rootItems) {
        const fullPath = serverURL + item;

        if (item.endsWith("/")) {
            const subFiles = await loadFolder(fullPath);

            subFiles.forEach(file => {
                if (isVideo(file)) {
                    addVideoCard(grid, fullPath + file, file);
                }
            });

        } else if (isVideo(item)) {
            addVideoCard(grid, fullPath, item);
        }
    }
}

function isVideo(file) {
    return (
        file.endsWith(".mp4") ||
        file.endsWith(".mkv") ||
        file.endsWith(".avi") ||
        file.endsWith(".mov") ||
        file.endsWith(".wmv") ||
        file.endsWith(".flv")
    );
}

function addVideoCard(grid, videoURL, fileName) {
    const card = document.createElement("div");
    card.className = "video-card";

    card.innerHTML = `
        <img src="thumbnail.png" style="width:100%; border-radius:8px;">
        <div class="video-title">${fileName}</div>
    `;

    card.onclick = () => {
        document.getElementById("player").src = videoURL;
        document.getElementById("player").play();
    };

    grid.appendChild(card
