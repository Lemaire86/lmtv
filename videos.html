<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMTV - Videos</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body { background: #050716; }

        /* HEADER */
        .section-header {
            text-align: center;
            margin-top: 110px;
            margin-bottom: 20px;
        }

        .section-logo {
            height: 90px;
            filter: drop-shadow(0 0 10px #a64dff);
        }

        .section-title {
            margin-top: 10px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #a64dff;
        }

        /* BACK / NEXT BUTTONS */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 10px 30px 25px 30px;
        }

        .btn-nav {
            background: #11152b;
            border: 1px solid #2b2c7f;
            padding: 8px 18px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-nav:hover {
            background: #1a1f3d;
            box-shadow: 0 0 10px #a64dff;
            transform: scale(1.05);
        }

        /* CONTENT */
        .videos-container {
            padding: 0 30px 50px 30px;
            color: white;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            background: #11152b;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #2b2c7f;
            text-align: center;
        }

        .video-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #a64dff;
            background: #1a1f3d;
        }

        .video-title {
            margin-top: 8px;
            font-size: 15px;
            opacity: 0.9;
        }

        video {
            width: 100%;
            max-height: 450px;
            border-radius: 12px;
            margin-bottom: 25px;
            background: black;
        }
    </style>
</head>

<body>

    <!-- NAVBAR (PA MANYEN) -->
    <div class="navbar">
        <a class="nav-item" href="index.html">🏠 HOME</a>
        <a class="nav-item" href="livetv.html">📺 LIVE TV</a>
        <a class="nav-item" href="movies.html">🎬 MOVIES</a>
        <a class="nav-item" href="cartoons.html">🧸 CARTOONS</a>
        <a class="nav-item" href="musics.html">🎵 MUSICS</a>
    </div>

    <!-- HEADER -->
    <div class="section-header">
        <img src="logo-lmtv.png" class="section-logo">
        <h1 class="section-title">VIDEOS</h1>
    </div>

    <!-- CONTENT -->
    <div class="videos-container">

        <!-- VIDEO PLAYER -->
        <video id="player" controls></video>

        <!-- VIDEOS GRID -->
        <div class="videos-grid" id="videosGrid"></div>

    </div>

<script>

const serverURL = "http://192.168.12.126:5500/";
const rootFolder = "VIDEOS/";

const videoExt = ["mp4","mkv","avi","mov","wmv","flv","mp3","wav","ogg","m4a"];

let currentPath = "";

// =====================
// LOAD FOLDER
// =====================
async function loadFolder(url){
    try{
        const res = await fetch(url);
        if(!res.ok) return [];

        const text = await res.text();

        const doc = new DOMParser()
            .parseFromString(text,"text/html");

        return [...doc.querySelectorAll("a")]
            .map(a => a.getAttribute("href"))
            .filter(h => h && h !== "../");

    }catch(e){
        return [];
    }
}

// =====================
// CHECK FILE
// =====================
function isMedia(file){
    return videoExt.some(ext =>
        file.toLowerCase().endsWith("." + ext)
    );
}

function isFolder(item){
    return item.endsWith("/");
}

// =====================
// UI CONTAINER (FIXED PANEL)
// =====================
function getContainer(){
    return document.getElementById("videosGrid");
}

// =====================
// LOAD ROOT (FOLDERS ONLY)
// =====================
async function showRoot(){

    currentPath = "";

    const container = getContainer();
    container.innerHTML = "";

    const items = await loadFolder(serverURL + rootFolder);

    items.forEach(item => {
        if(isFolder(item)){
            addFolder(container, item);
        }
    });
}

// =====================
// OPEN FOLDER
// =====================
async function openFolder(folder){

    currentPath += folder;

    renderCurrent();
}

function createFolderCard(name){

    const el = document.createElement("div");

    el.style.padding = "18px";
    el.style.background = "#1a1f3d";
    el.style.borderRadius = "12px";
    el.style.cursor = "pointer";
    el.style.textAlign = "center";
    el.style.fontSize = "16px";

    el.innerHTML = "📁 " + name.replace("/","");

    el.onclick = () => openFolder(name);

    return el;
}

function createFileCard(path, name){

    const el = document.createElement("div");

    el.style.padding = "18px";
    el.style.background = "#0f1226";
    el.style.borderRadius = "12px";
    el.style.cursor = "pointer";
    el.style.textAlign = "center";
    el.style.fontSize = "14px";

    el.innerHTML = "🎞️ " + decodeURIComponent(name);

    el.onclick = () => {

        const player = document.getElementById("player");

        player.src = serverURL + rootFolder + path;
        player.load();
        player.play().catch(()=>{});
    };

    return el;
}

// =====================
// RENDER CURRENT PATH
// =====================
async function renderCurrent(){

    const container = getContainer();

    // 🔥 Vide container la
    container.innerHTML = "";

    // 🔥 Fè fichye yo an kolonn
    container.className = "folder-list";

    // BACK BUTTON
    const back = document.createElement("div");
    back.innerHTML = "⬅ Back";
    back.style.color = "#00d9ff";
    back.style.cursor = "pointer";
    back.style.marginBottom = "10px";
    back.style.fontSize = "18px";
    back.style.padding = "10px 0";


    back.onclick = () => {
        let parts = currentPath.split("/").filter(Boolean);
        parts.pop();
        currentPath = parts.length ? parts.join("/") + "/" : "";
        renderCurrent();
    };

    container.appendChild(back);

    // 🔥 Chaje fichye yo
    const items = await loadFolder(serverURL + rootFolder + currentPath);

    let hasFiles = false;

    items.forEach(item => {

        const full = currentPath + item;

        if(isFolder(item)){
            addFolder(container, item);
        }

        else if(isMedia(item)){
            hasFiles = true;
            addFile(container, full, item);
        }
    });

    // Si pa gen anyen
    if(!hasFiles && items.length === 0){
        const empty = document.createElement("div");
        empty.innerHTML = "📭 Pa gen fichiers";
        empty.style.opacity = "0.7";
        container.appendChild(empty);
    }
}

// =====================
// FOLDER CARD
// =====================
function addFolder(container, name){
    const el = document.createElement("div");

    el.className = "video-card";
    el.innerHTML = "📁 " + name.replace("/", "");
    el.style.fontSize = "18px";

    el.onclick = () => openFolder(name);

    container.appendChild(el);
}

// =====================
// FILE CARD
// =====================
function addFile(container, path, name){
    const el = document.createElement("div");

    el.className = "video-card";
    el.innerHTML = "🎞️ " + decodeURIComponent(name);
    el.style.fontSize = "16px";

    el.onclick = () => {
        const player = document.getElementById("player");
        player.src = serverURL + rootFolder + path;
        player.load();
        player.play().catch(()=>{});
    };

    container.appendChild(el);
}

// =====================
// START
// =====================
showRoot();

</script>

</body>
</html>
